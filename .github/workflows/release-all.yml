name: 一键打包 Mac 和 Windows

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: crosscopy-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  mac:
    name: macOS 通用版
    runs-on: macos-14
    timeout-minutes: 45
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: 缓存 Rust 依赖
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: 安装前端依赖
        run: npm ci

      - name: 打包 macOS Intel 和 Apple Silicon 通用版
        run: npm run build -- --target universal-apple-darwin

      - name: 上传 macOS 安装包
        uses: actions/upload-artifact@v4
        with:
          name: CrossCopy-macOS-Universal
          path: |
            src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app
          if-no-files-found: error
          compression-level: 0
          retention-days: 30

  windows:
    name: Windows 64 位
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 缓存 Rust 依赖
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: 安装前端依赖
        run: npm ci

      - name: 打包 Windows EXE 和 MSI 安装包
        run: npm run build

      - name: 上传 Windows 安装包
        uses: actions/upload-artifact@v4
        with:
          name: CrossCopy-Windows-x64
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error
          compression-level: 0
          retention-days: 30
